<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0, viewport-fit=cover">
  <title>逻辑门模拟器</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(145deg, #1a1e2c 0%, #252b3d 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Roboto', system-ui, sans-serif;
      padding: 8px;
    }
    .simulator {
      background: #0f1219;
      border-radius: 28px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
      padding: 18px 20px 20px 20px;
      width: fit-content;
      max-width: 100%;
    }
    .main-layout {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .canvas-area {
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      margin-bottom: 16px;
      padding: 8px 12px;
      background: #1e2433;
      border-radius: 48px;
      box-shadow: inset 0 2px 4px #00000030, 0 4px 8px #00000040;
    }
    .btn-group {
      display: flex;
      gap: 5px;
      background: #0b0e14;
      padding: 4px;
      border-radius: 36px;
      box-shadow: inset 0 1px 3px #000000;
      flex-wrap: wrap;
    }
    .btn {
      background: #2a3348;
      border: none;
      color: #e3e9ff;
      font-weight: 600;
      font-size: 14px;
      padding: 8px 14px;
      border-radius: 32px;
      cursor: pointer;
      box-shadow: 0 2px 0 #0f1219, 0 3px 6px #00000060;
      transition: all 0.1s ease;
      letter-spacing: 0.3px;
      border: 1px solid #4e5b77;
      touch-action: manipulation;
      white-space: nowrap;
    }
    .btn.small {
      padding: 6px 12px;
      font-size: 13px;
    }
    .btn.active {
      background: #3f6ad8;
      color: white;
      box-shadow: 0 0 8px #3f6ad8aa, 0 2px 0 #1e2f5a;
      border-color: #8aabff;
      transform: translateY(1px);
    }
    .btn.warning.active {
      background: #c05a5a;
      box-shadow: 0 0 8px #c05a5aaa;
      border-color: #ffb0b0;
    }
    .btn:active {
      transform: translateY(2px);
      box-shadow: 0 1px 0 #0f1219, 0 2px 4px black;
    }
    .spacer {
      flex: 1;
    }
    .zoom-control {
      display: flex;
      align-items: center;
      gap: 6px;
      background: #151b26;
      padding: 4px 12px;
      border-radius: 40px;
      box-shadow: inset 0 0 6px #000000;
    }
    .zoom-control label {
      color: #b7c0d8;
      font-weight: 500;
      font-size: 14px;
    }
    .zoom-control input {
      width: 120px;
      accent-color: #3f6ad8;
    }
    .zoom-value {
      color: #e0e6ff;
      min-width: 45px;
      text-align: right;
      font-weight: 700;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
      padding: 0 8px;
      flex-wrap: wrap;
      gap: 5px;
    }
    .mode-badge {
      background: #1e2533;
      padding: 6px 16px;
      border-radius: 24px;
      color: #b7c7ff;
      font-weight: 500;
      font-size: 13px;
      box-shadow: inset 0 1px 3px black;
    }
    .hint {
      color: #7f8aa3;
      font-size: 12px;
    }
    canvas {
      display: block;
      margin: 0 auto;
      background: #10131c;
      border-radius: 24px;
      box-shadow: inset 0 0 0 1px #2f3a4e, inset 0 8px 12px #00000080, 0 12px 20px #000000;
      cursor: grab;
      touch-action: none;
      width: 100%;
      height: auto;
      max-width: 100%;
    }
    canvas.dragging {
      cursor: grabbing;
    }
    canvas.connect-mode {
      cursor: crosshair;
    }
    canvas.delete-mode {
      cursor: not-allowed;
    }

    .component-panel {
      width: 260px;
      background: #151b26;
      border-radius: 20px;
      padding: 16px 12px;
      box-shadow: inset 0 2px 4px #00000040, 0 8px 16px #00000060;
      color: #d3dcf5;
      max-height: 650px;
      display: flex;
      flex-direction: column;
      border: 1px solid #2f3a4e;
    }
    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #2f3a4e;
    }
    .panel-header h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: #c6d4ff;
    }
    .panel-header button {
      background: #2a3348;
      border: none;
      color: #b0c0ee;
      font-size: 18px;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: inset 0 1px 2px #000000;
    }
    .component-list {
      overflow-y: auto;
      flex: 1;
      padding-right: 4px;
    }
    .list-item {
      background: #1e2533;
      margin-bottom: 6px;
      padding: 10px 10px;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s;
      border-left: 4px solid #3f6ad8;
      box-shadow: 0 2px 4px #00000030;
    }
    .list-item:hover {
      background: #2a354b;
      transform: translateX(2px);
    }
    .list-item-header {
      display: flex;
      justify-content: space-between;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .item-type {
      color: #b7c7ff;
    }
    .item-id {
      color: #8a9ac0;
      font-size: 12px;
    }
    .item-detail {
      font-size: 12px;
      color: #aab9e0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px 10px;
    }
    .item-label {
      color: #ffecb3;
      font-style: italic;
    }
  </style>
</head>
<body>
<div class="simulator">
  <div class="main-layout">
    <div class="canvas-area">
      <div class="toolbar">
        <div class="btn-group">
          <button class="btn" data-gate="AND">➕ AND</button>
          <button class="btn" data-gate="OR">⚫ OR</button>
          <button class="btn" data-gate="XOR">❌ XOR</button>
          <button class="btn" data-gate="NOT">🔺 NOT</button>
        </div>
        <div class="btn-group">
          <button class="btn small" data-gate="SWITCH">🔘 开关</button>
          <button class="btn small" data-gate="LED">💡 灯泡</button>
        </div>
        <button class="btn small" id="wireModeBtn">🔗 连线</button>
        <button class="btn small" id="deleteWireModeBtn">✂️ 删线</button>
        <button class="btn small" id="deleteModeBtn">🗑️ 删元件</button>
        <button class="btn small" id="labelModeBtn">📝 批注文字</button>
        <button class="btn small" id="clearWiresBtn">🧹 清线</button>
        <button class="btn small" id="saveFileBtn">📄 导出</button>
        <button class="btn small" id="loadFileBtn">📂 导入</button>
        <button class="btn small" id="resetViewBtn">🎯 重定向回页面中心</button>
        <div class="spacer"></div>
        <div class="zoom-control">
          <label>🔍</label>
          <input type="range" id="zoomSlider" min="0.4" max="2.2" value="1.0" step="0.02">
          <span class="zoom-value" id="zoomPercent">100%</span>
        </div>
      </div>
      <canvas id="logicCanvas" width="900" height="550"></canvas>
      <div class="status-bar">
        <span class="mode-badge" id="modeDisplay">🖱️ 拖拽/移动</span>
        <span class="hint">👆 开关：点击拨杆切换 · 拖拽边框移动 · 双指平移+缩放</span>
      </div>
    </div>

    <div class="component-panel">
      <div class="panel-header">
        <h3>📋 元件列表 (<span id="gateCount">0</span>)</h3>
        <button id="refreshListBtn" title="刷新列表">↻</button>
      </div>
      <div class="component-list" id="componentListContainer">
        <div style="color:#7a86a8; text-align:center; padding:20px;">点击刷新或添加元件</div>
      </div>
    </div>
  </div>
  <input type="file" id="fileInput" accept=".json,application/json" style="display: none;">
</div>

<script>
  (function(){
    "use strict";

    const canvas = document.getElementById('logicCanvas');
    const ctx = canvas.getContext('2d');
    const fileInput = document.getElementById('fileInput');
    
    const LOGIC_WIDTH = 900;
    const LOGIC_HEIGHT = 550;
    
    let view = { scale: 1.0, offsetX: 0, offsetY: 0 };
    
    function getCanvasCoordsFromEvent(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = LOGIC_WIDTH / rect.width;
      const scaleY = LOGIC_HEIGHT / rect.height;
      
      let clientX, clientY;
      if (e.touches && e.touches.length > 0) {
        clientX = e.touches[0].clientX;
        clientY = e.touches[0].clientY;
      } else {
        clientX = e.clientX;
        clientY = e.clientY;
      }
      
      const canvasX = clientX - rect.left;
      const canvasY = clientY - rect.top;
      
      return { sx: canvasX * scaleX, sy: canvasY * scaleY, clientX, clientY };
    }
    
    function worldToScreen(wx, wy) {
      return { x: wx * view.scale + view.offsetX, y: wy * view.scale + view.offsetY };
    }
    function screenToWorld(sx, sy) {
      return { x: (sx - view.offsetX) / view.scale, y: (sy - view.offsetY) / view.scale };
    }

    let gates = [];
    let wires = [];
    let nextId = 1000;
    
    let interactionMode = 'select';
    let isDraggingGate = false;
    let draggedGateId = null;
    let dragOffsetX = 0, dragOffsetY = 0;
    
    let connectingFrom = null;
    let tempWireEnd = null;
    
    let isPanning = false;
    let panLast = { x: 0, y: 0 };
    let panStartOffset = { x: 0, y: 0 };
    
    let isPinching = false;
    let pinchStartDist = 0;
    let pinchStartScale = 1.0;
    let pinchCenter = { x: 0, y: 0 };
    
    let highlightGateId = null;
    let highlightTimer = null;
    
    const modeDisplay = document.getElementById('modeDisplay');
    const wireModeBtn = document.getElementById('wireModeBtn');
    const deleteWireModeBtn = document.getElementById('deleteWireModeBtn');
    const deleteModeBtn = document.getElementById('deleteModeBtn');
    const labelModeBtn = document.getElementById('labelModeBtn');
    const zoomSlider = document.getElementById('zoomSlider');
    const zoomPercent = document.getElementById('zoomPercent');
    const gateCountSpan = document.getElementById('gateCount');
    const componentListDiv = document.getElementById('componentListContainer');

    const gateTypes = {
      AND:   { name: 'AND', inputs: 2, outputCount: 1, color: '#3a6ea5', width: 70, height: 50 },
      OR:    { name: 'OR',  inputs: 2, outputCount: 1, color: '#5f4b8b', width: 70, height: 50 },
      XOR:   { name: 'XOR', inputs: 2, outputCount: 1, color: '#9b6b9e', width: 70, height: 50 },
      NOT:   { name: 'NOT', inputs: 1, outputCount: 1, color: '#9e6d3e', width: 60, height: 50 },
      SWITCH:{ name: 'SW',  inputs: 0, outputCount: 1, color: '#4a6a5a', width: 60, height: 60 },
      LED:   { name: 'LED', inputs: 1, outputCount: 0, color: '#6a4a4a', width: 60, height: 60 }
    };

    function getGateInfo(gate) {
      return gateTypes[gate.type] || gateTypes.AND;
    }

    // ----- 导入导出 -----
    function exportToFile() {
      try {
        const data = { gates, wires, nextId, view };
        const json = JSON.stringify(data, null, 2);
        const blob = new Blob([json], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `logic_circuit_${new Date().toISOString().slice(0,19).replace(/:/g,'-')}.json`;
        a.click();
        URL.revokeObjectURL(url);
      } catch(e) { alert('导出失败: ' + e); }
    }
    
    function importFromFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          gates = data.gates || [];
          wires = data.wires || [];
          nextId = data.nextId || 1000;
          if (data.view) {
            view.scale = data.view.scale || 1.0;
            view.offsetX = data.view.offsetX || 0;
            view.offsetY = data.view.offsetY || 0;
            zoomSlider.value = view.scale;
            zoomPercent.textContent = Math.round(view.scale * 100) + '%';
          }
          gates.forEach(g => { if (g.label === undefined) g.label = ''; });
          evaluateCircuit();
          updateComponentList();
          draw();
          alert('✅ 电路已导入');
        } catch(ex) { alert('文件解析失败: ' + ex); }
      };
      reader.readAsText(file);
    }

    function initDemo() {
      gates = [];
      wires = [];
      gates.push({ id: nextId++, type: 'SWITCH', x: 80, y: 150, outputValue: 0, label: '输入A' });
      gates.push({ id: nextId++, type: 'SWITCH', x: 80, y: 280, outputValue: 1, label: '输入B' });
      gates.push({ id: nextId++, type: 'AND', x: 250, y: 180, inputs: [0,0], outputValue: 0, label: '与门' });
      gates.push({ id: nextId++, type: 'XOR', x: 400, y: 250, inputs: [0,0], outputValue: 0, label: '异或' });
      gates.push({ id: nextId++, type: 'NOT', x: 550, y: 200, inputs: [0], outputValue: 1, label: '非门' });
      gates.push({ id: nextId++, type: 'LED', x: 680, y: 220, inputs: [0], outputValue: 0, label: '输出' });
      
      wires.push({ from: gates[0].id, to: gates[2].id, toIndex: 0 });
      wires.push({ from: gates[1].id, to: gates[2].id, toIndex: 1 });
      wires.push({ from: gates[2].id, to: gates[3].id, toIndex: 0 });
      wires.push({ from: gates[1].id, to: gates[3].id, toIndex: 1 });
      wires.push({ from: gates[3].id, to: gates[4].id, toIndex: 0 });
      wires.push({ from: gates[4].id, to: gates[5].id, toIndex: 0 });
      evaluateCircuit();
      updateComponentList();
    }

    function evaluateCircuit() {
      for (let g of gates) {
        const info = getGateInfo(g);
        if (g.type === 'SWITCH') continue;
        if (g.type === 'LED') { g.inputs = [0]; continue; }
        g.inputs = new Array(info.inputs).fill(0);
      }
      for (let w of wires) {
        const fromGate = gates.find(g => g.id === w.from);
        const toGate = gates.find(g => g.id === w.to);
        if (!fromGate || !toGate) continue;
        const toInfo = getGateInfo(toGate);
        if (w.toIndex >= 0 && w.toIndex < toInfo.inputs) {
          toGate.inputs[w.toIndex] = fromGate.outputValue;
        }
      }
      let changed = true, iter = 0;
      while (changed && iter < 30) {
        changed = false; iter++;
        for (let g of gates) {
          if (g.type === 'SWITCH') continue;
          let newOut = 0;
          if (g.type === 'LED') newOut = g.inputs[0] || 0;
          else if (g.type === 'AND') newOut = (g.inputs[0] && g.inputs[1]) ? 1 : 0;
          else if (g.type === 'OR') newOut = (g.inputs[0] || g.inputs[1]) ? 1 : 0;
          else if (g.type === 'XOR') newOut = (g.inputs[0] ^ g.inputs[1]) ? 1 : 0;
          else if (g.type === 'NOT') newOut = g.inputs[0] ? 0 : 1;
          if (g.outputValue !== newOut) { g.outputValue = newOut; changed = true; }
        }
        for (let w of wires) {
          const fromGate = gates.find(g => g.id === w.from);
          const toGate = gates.find(g => g.id === w.to);
          if (!fromGate || !toGate) continue;
          const toInfo = getGateInfo(toGate);
          if (w.toIndex < toInfo.inputs) toGate.inputs[w.toIndex] = fromGate.outputValue;
        }
      }
    }

    // ----- 绘制 -----
    function draw() {
      ctx.clearRect(0, 0, LOGIC_WIDTH, LOGIC_HEIGHT);
      ctx.save();
      ctx.translate(view.offsetX, view.offsetY);
      ctx.scale(view.scale, view.scale);
      
      // 网格
      ctx.lineWidth = 0.8 / view.scale;
      ctx.strokeStyle = '#2a334a';
      ctx.beginPath();
      const gridStep = 40;
      const worldW = LOGIC_WIDTH / view.scale;
      const worldH = LOGIC_HEIGHT / view.scale;
      const startX = Math.floor(-view.offsetX / view.scale / gridStep) * gridStep;
      const startY = Math.floor(-view.offsetY / view.scale / gridStep) * gridStep;
      for (let x = startX; x < worldW + startX; x += gridStep) {
        ctx.moveTo(x, 0); ctx.lineTo(x, worldH);
      }
      for (let y = startY; y < worldH + startY; y += gridStep) {
        ctx.moveTo(0, y); ctx.lineTo(worldW, y);
      }
      ctx.stroke();
      
      // 连线
      wires.forEach(wire => {
        const fromGate = gates.find(g => g.id === wire.from);
        const toGate = gates.find(g => g.id === wire.to);
        if (!fromGate || !toGate) return;
        const fromPos = getOutputPortPosition(fromGate);
        const toPos = getInputPortPosition(toGate, wire.toIndex);
        const val = fromGate.outputValue;
        ctx.beginPath();
        ctx.moveTo(fromPos.x, fromPos.y);
        ctx.lineTo(toPos.x, toPos.y);
        ctx.strokeStyle = val ? '#ff5e7a' : '#6a8cff';
        ctx.lineWidth = (val ? 3.5 : 2.5) / view.scale;
        ctx.shadowColor = val ? '#ff8a9f' : '#5f8aff';
        ctx.shadowBlur = 8 / view.scale;
        ctx.stroke();
        ctx.shadowBlur = 0;
      });
      
      if (interactionMode === 'connect' && connectingFrom && tempWireEnd) {
        const fromGate = gates.find(g => g.id === connectingFrom.gateId);
        if (fromGate) {
          const fromPos = getOutputPortPosition(fromGate);
          ctx.beginPath();
          ctx.moveTo(fromPos.x, fromPos.y);
          ctx.lineTo(tempWireEnd.x, tempWireEnd.y);
          ctx.strokeStyle = '#f0c45a';
          ctx.lineWidth = 3 / view.scale;
          ctx.setLineDash([8 / view.scale, 6 / view.scale]);
          ctx.stroke();
          ctx.setLineDash([]);
        }
      }
      
      // 门
      gates.forEach(gate => {
        const info = getGateInfo(gate);
        const w = info.width, h = info.height;
        const x = gate.x - w/2, y = gate.y - h/2;
        const isHighlight = (gate.id === highlightGateId);
        
        if (gate.type === 'SWITCH') drawSwitch(gate, x, y, w, h, isHighlight);
        else if (gate.type === 'LED') drawLED(gate, x, y, w, h, isHighlight);
        else {
          ctx.fillStyle = info.color;
          ctx.shadowColor = '#00000070';
          ctx.shadowBlur = 12 / view.scale;
          ctx.beginPath();
          ctx.roundRect(x, y, w, h, 10);
          ctx.fill();
          if (isHighlight) {
            ctx.shadowBlur = 20 / view.scale;
            ctx.shadowColor = '#ffdd55';
          }
          ctx.shadowBlur = 0;
          ctx.strokeStyle = isHighlight ? '#ffd966' : '#e0e6ff';
          ctx.lineWidth = (isHighlight ? 3.5 : 2) / view.scale;
          ctx.stroke();
          
          ctx.font = `bold ${16 / view.scale}px 'Segoe UI', system-ui`;
          ctx.fillStyle = '#ffffff';
          ctx.shadowColor = '#000000b0';
          ctx.shadowBlur = 6 / view.scale;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(info.name, gate.x, gate.y - 2);
          
          ctx.font = `bold ${14 / view.scale}px monospace`;
          ctx.fillStyle = gate.outputValue ? '#b0ffb0' : '#c0caf5';
          ctx.fillText(gate.outputValue, gate.x, gate.y + 14);
          ctx.shadowBlur = 0;
        }
        
        if (gate.label && gate.label.trim() !== '') {
          ctx.font = `italic ${13 / view.scale}px 'Segoe UI', sans-serif`;
          ctx.fillStyle = '#ffecb3';
          ctx.shadowColor = '#000000';
          ctx.shadowBlur = 6 / view.scale;
          ctx.textAlign = 'center';
          ctx.textBaseline = 'top';
          ctx.fillText(gate.label, gate.x, gate.y + info.height/2 + 6);
          ctx.shadowBlur = 0;
        }
        
        if (info.inputs > 0) {
          for (let i = 0; i < info.inputs; i++) {
            const portPos = getInputPortPosition(gate, i);
            ctx.beginPath();
            ctx.arc(portPos.x, portPos.y, 7 / view.scale, 0, 2*Math.PI);
            ctx.fillStyle = '#1e1e2f';
            ctx.fill();
            ctx.strokeStyle = '#b0c2ff';
            ctx.lineWidth = 2.2 / view.scale;
            ctx.stroke();
            if (wires.some(w => w.to === gate.id && w.toIndex === i)) {
              ctx.beginPath();
              ctx.arc(portPos.x, portPos.y, 4 / view.scale, 0, 2*Math.PI);
              ctx.fillStyle = '#7aaaff';
              ctx.fill();
            }
          }
        }
        
        if (info.outputCount > 0) {
          const outPos = getOutputPortPosition(gate);
          ctx.beginPath();
          ctx.arc(outPos.x, outPos.y, 8 / view.scale, 0, 2*Math.PI);
          ctx.fillStyle = '#2d2f42';
          ctx.fill();
          ctx.strokeStyle = gate.outputValue ? '#ff8a9f' : '#aac8ff';
          ctx.lineWidth = 2.5 / view.scale;
          ctx.stroke();
          ctx.beginPath();
          ctx.arc(outPos.x, outPos.y, 4.5 / view.scale, 0, 2*Math.PI);
          ctx.fillStyle = gate.outputValue ? '#ff5e7a' : '#6a8cff';
          ctx.fill();
        }
      });
      ctx.restore();
    }

    function drawSwitch(gate, x, y, w, h, highlight) {
      const val = gate.outputValue;
      ctx.fillStyle = '#3a404f';
      ctx.shadowColor = '#00000080';
      ctx.shadowBlur = 8 / view.scale;
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, 12);
      ctx.fill();
      if (highlight) {
        ctx.shadowBlur = 18 / view.scale;
        ctx.shadowColor = '#ffdd55';
      }
      ctx.shadowBlur = 0;
      ctx.strokeStyle = highlight ? '#ffd966' : '#6a738b';
      ctx.lineWidth = (highlight ? 3 : 2) / view.scale;
      ctx.stroke();
      
      const pivotX = gate.x, pivotY = gate.y - 2;
      const angle = val ? 0.5 : -0.5;
      const leverLen = h * 0.35;
      const tipX = pivotX + Math.sin(angle) * leverLen;
      const tipY = pivotY - Math.cos(angle) * leverLen;
      
      ctx.beginPath();
      ctx.moveTo(pivotX - 3 / view.scale, pivotY);
      ctx.lineTo(pivotX + 3 / view.scale, pivotY);
      ctx.lineTo(tipX, tipY);
      ctx.closePath();
      ctx.fillStyle = '#d4dcec';
      ctx.shadowBlur = 4 / view.scale;
      ctx.fill();
      ctx.strokeStyle = '#8a9ac0';
      ctx.lineWidth = 1.8 / view.scale;
      ctx.stroke();
      
      ctx.font = `bold ${18 / view.scale}px 'Segoe UI'`;
      ctx.fillStyle = val ? '#b0ffb0' : '#c0caf5';
      ctx.shadowBlur = 8 / view.scale;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(val ? '1' : '0', gate.x, gate.y + h*0.3);
      ctx.shadowBlur = 0;
    }

    function drawLED(gate, x, y, w, h, highlight) {
      const val = gate.outputValue;
      ctx.fillStyle = '#3a3f4f';
      ctx.shadowBlur = 6 / view.scale;
      ctx.beginPath();
      ctx.ellipse(gate.x, gate.y + h*0.15, w*0.35, h*0.2, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.strokeStyle = highlight ? '#ffd966' : '#6a738b';
      ctx.lineWidth = (highlight ? 3 : 1.5) / view.scale;
      ctx.stroke();
      
      const gradient = ctx.createRadialGradient(gate.x-5, gate.y-8, 2, gate.x, gate.y-5, w*0.45);
      if (val) {
        gradient.addColorStop(0, '#ffdd88');
        gradient.addColorStop(0.5, '#ff6600');
        gradient.addColorStop(1, '#aa3300');
      } else {
        gradient.addColorStop(0, '#aaaaaa');
        gradient.addColorStop(0.6, '#555566');
        gradient.addColorStop(1, '#2a2a33');
      }
      ctx.fillStyle = gradient;
      ctx.shadowColor = val ? '#ff8800' : '#444';
      ctx.shadowBlur = (val ? 20 : 8) / view.scale;
      if (highlight) ctx.shadowBlur = 28 / view.scale;
      ctx.beginPath();
      ctx.ellipse(gate.x, gate.y - h*0.1, w*0.4, h*0.35, 0, 0, Math.PI*2);
      ctx.fill();
      
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.arc(gate.x-6, gate.y-14, 5 / view.scale, 0, Math.PI*2);
      ctx.fillStyle = '#ffffff30';
      ctx.fill();
      
      ctx.font = `bold ${16 / view.scale}px 'Segoe UI'`;
      ctx.fillStyle = val ? '#ffffff' : '#aaaacc';
      ctx.shadowColor = val ? '#ffaa00' : '#000';
      ctx.shadowBlur = 8 / view.scale;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(val ? '1' : '0', gate.x, gate.y + h*0.3);
      ctx.shadowBlur = 0;
    }

    function getOutputPortPosition(gate) {
      const info = getGateInfo(gate);
      return { x: gate.x + info.width/2, y: gate.y };
    }
    function getInputPortPosition(gate, index) {
      const info = getGateInfo(gate);
      const total = info.inputs;
      if (total === 0) return { x: gate.x, y: gate.y };
      const spacing = info.height / (total + 1);
      const yOffset = -info.height/2 + spacing * (index + 1);
      return { x: gate.x - info.width/2, y: gate.y + yOffset };
    }

    // 核心修复：精确判断是否点击开关拨杆区域 (切换)
    function isPointInSwitchLever(gate, worldX, worldY) {
      const info = getGateInfo(gate);
      const pivotX = gate.x;
      const pivotY = gate.y - 2;
      // 拨杆长度约35%高度，加上一些余量
      const leverLen = info.height * 0.35;
      const dist = Math.hypot(worldX - pivotX, worldY - pivotY);
      // 较小阈值，确保大部分底座区域可拖拽
      return dist < leverLen * 0.9; 
    }

    function findPortAt(worldX, worldY) {
      for (let gate of gates) {
        const info = getGateInfo(gate);
        if (info.outputCount > 0) {
          const outPos = getOutputPortPosition(gate);
          if (Math.hypot(worldX - outPos.x, worldY - outPos.y) < 14) return { gateId: gate.id, portType: 'output' };
        }
        for (let i = 0; i < info.inputs; i++) {
          const inPos = getInputPortPosition(gate, i);
          if (Math.hypot(worldX - inPos.x, worldY - inPos.y) < 12) return { gateId: gate.id, portType: 'input', index: i };
        }
      }
      return null;
    }
    
    function findGateAt(worldX, worldY) {
      for (let i = gates.length - 1; i >= 0; i--) {
        const g = gates[i];
        const info = getGateInfo(g);
        const left = g.x - info.width/2, right = g.x + info.width/2;
        const top = g.y - info.height/2, bottom = g.y + info.height/2;
        if (worldX >= left && worldX <= right && worldY >= top && worldY <= bottom) return g;
      }
      return null;
    }

    function findWireNearPoint(worldX, worldY, threshold = 12) {
      let minDist = threshold, foundIdx = -1;
      wires.forEach((wire, idx) => {
        const fromGate = gates.find(g => g.id === wire.from);
        const toGate = gates.find(g => g.id === wire.to);
        if (!fromGate || !toGate) return;
        const p1 = getOutputPortPosition(fromGate);
        const p2 = getInputPortPosition(toGate, wire.toIndex);
        const dist = pointToSegmentDistance(worldX, worldY, p1.x, p1.y, p2.x, p2.y);
        if (dist < minDist) { minDist = dist; foundIdx = idx; }
      });
      return foundIdx;
    }
    
    function pointToSegmentDistance(px, py, x1, y1, x2, y2) {
      const vx = x2 - x1, vy = y2 - y1;
      const dx = px - x1, dy = py - y1;
      const dot = vx*dx + vy*dy;
      const lenSq = vx*vx + vy*vy;
      let t = (lenSq === 0) ? 0 : Math.max(0, Math.min(1, dot / lenSq));
      const projX = x1 + t*vx, projY = y1 + t*vy;
      return Math.hypot(px - projX, py - projY);
    }

    function deleteGate(gateId) {
      gates = gates.filter(g => g.id !== gateId);
      wires = wires.filter(w => w.from !== gateId && w.to !== gateId);
      evaluateCircuit();
      updateComponentList();
      draw();
    }

    // ----- 事件处理 (开关修复：拨杆切换，其他区域拖拽)-----
    function handlePointerDown(e) {
      e.preventDefault();
      const coords = getCanvasCoordsFromEvent(e);
      const world = screenToWorld(coords.sx, coords.sy);
      
      if (e.touches) {
        if (e.touches.length === 2) {
          const t1 = e.touches[0], t2 = e.touches[1];
          const cx = (t1.clientX + t2.clientX)/2, cy = (t1.clientY + t2.clientY)/2;
          const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
          isPanning = true; isPinching = true;
          panLast.x = cx; panLast.y = cy;
          panStartOffset.x = view.offsetX; panStartOffset.y = view.offsetY;
          pinchStartDist = dist; pinchStartScale = view.scale;
          const rect = canvas.getBoundingClientRect();
          const scaleX = LOGIC_WIDTH / rect.width, scaleY = LOGIC_HEIGHT / rect.height;
          const centerLogicalX = (cx - rect.left) * scaleX, centerLogicalY = (cy - rect.top) * scaleY;
          pinchCenter = screenToWorld(centerLogicalX, centerLogicalY);
          canvas.style.cursor = 'grabbing';
          return;
        }
      }
      
      if (!e.touches && (e.button === 1 || e.button === 2)) {
        isPanning = true;
        panLast.x = coords.clientX; panLast.y = coords.clientY;
        panStartOffset.x = view.offsetX; panStartOffset.y = view.offsetY;
        canvas.style.cursor = 'grabbing';
        return;
      }
      
      if (e.button !== 0 && !e.touches) return;
      
      if (interactionMode === 'label') {
        const gate = findGateAt(world.x, world.y);
        if (gate) {
          const newLabel = prompt('请输入元件批注文字文字', gate.label || '');
          if (newLabel !== null) {
            gate.label = newLabel.trim();
            updateComponentList();
            draw();
          }
        }
        return;
      }
      
      if (interactionMode === 'deleteGate') {
        const gate = findGateAt(world.x, world.y);
        if (gate) deleteGate(gate.id);
        return;
      }
      
      if (interactionMode === 'deleteWire') {
        const wireIdx = findWireNearPoint(world.x, world.y, 15);
        if (wireIdx !== -1) { wires.splice(wireIdx, 1); evaluateCircuit(); updateComponentList(); draw(); }
        return;
      }
      
      if (interactionMode === 'connect') {
        const port = findPortAt(world.x, world.y);
        if (!port) return;
        if (!connectingFrom) {
          if (port.portType === 'output') {
            connectingFrom = { gateId: port.gateId };
            tempWireEnd = { x: world.x, y: world.y };
          }
        } else {
          if (port.portType === 'input') {
            const fromGate = gates.find(g => g.id === connectingFrom.gateId);
            const toGate = gates.find(g => g.id === port.gateId);
            if (fromGate && toGate && fromGate.id !== toGate.id) {
              if (!wires.some(w => w.from === fromGate.id && w.to === toGate.id && w.toIndex === port.index)) {
                wires.push({ from: fromGate.id, to: toGate.id, toIndex: port.index });
                evaluateCircuit();
                updateComponentList();
              }
            }
          }
          connectingFrom = null; tempWireEnd = null;
        }
        draw();
        return;
      }
      
      // 选择模式
      const clickedGate = findGateAt(world.x, world.y);
      if (clickedGate) {
        // 开关特殊处理：如果点击拨杆区域则切换，否则拖拽
        if (clickedGate.type === 'SWITCH') {
          if (isPointInSwitchLever(clickedGate, world.x, world.y)) {
            clickedGate.outputValue = clickedGate.outputValue ? 0 : 1;
            evaluateCircuit();
            updateComponentList();
            draw();
            return; // 不进入拖拽
          }
        }
        // 任何门（包括开关的非拨杆区域）进入拖拽
        isDraggingGate = true;
        draggedGateId = clickedGate.id;
        dragOffsetX = world.x - clickedGate.x;
        dragOffsetY = world.y - clickedGate.y;
        canvas.classList.add('dragging');
      }
    }

    function handlePointerMove(e) {
      e.preventDefault();
      const coords = getCanvasCoordsFromEvent(e);
      const world = screenToWorld(coords.sx, coords.sy);
      
      if (e.touches && e.touches.length === 2) {
        const t1 = e.touches[0], t2 = e.touches[1];
        const cx = (t1.clientX + t2.clientX)/2, cy = (t1.clientY + t2.clientY)/2;
        const dist = Math.hypot(t1.clientX - t2.clientX, t1.clientY - t2.clientY);
        if (isPanning && isPinching) {
          view.offsetX = panStartOffset.x + (cx - panLast.x);
          view.offsetY = panStartOffset.y + (cy - panLast.y);
          if (pinchStartDist > 0) {
            const scaleFactor = dist / pinchStartDist;
            const newScale = Math.min(2.2, Math.max(0.4, pinchStartScale * scaleFactor));
            const dx = pinchCenter.x * (newScale - view.scale);
            const dy = pinchCenter.y * (newScale - view.scale);
            view.offsetX -= dx; view.offsetY -= dy;
            view.scale = newScale;
            zoomSlider.value = view.scale;
            zoomPercent.textContent = Math.round(view.scale * 100) + '%';
          }
          draw();
        } else {
          isPanning = true; isPinching = true;
          panLast.x = cx; panLast.y = cy;
          panStartOffset.x = view.offsetX; panStartOffset.y = view.offsetY;
          pinchStartDist = dist; pinchStartScale = view.scale;
          const rect = canvas.getBoundingClientRect();
          const scaleX = LOGIC_WIDTH / rect.width, scaleY = LOGIC_HEIGHT / rect.height;
          const centerLogicalX = (cx - rect.left) * scaleX, centerLogicalY = (cy - rect.top) * scaleY;
          pinchCenter = screenToWorld(centerLogicalX, centerLogicalY);
        }
        return;
      }
      
      if (isPanning) {
        if (!e.touches || e.touches.length < 2) {
          view.offsetX = panStartOffset.x + (coords.clientX - panLast.x);
          view.offsetY = panStartOffset.y + (coords.clientY - panLast.y);
          draw();
        }
        return;
      }
      
      if (isDraggingGate && draggedGateId !== null) {
        const gate = gates.find(g => g.id === draggedGateId);
        if (gate) {
          gate.x = world.x - dragOffsetX;
          gate.y = world.y - dragOffsetY;
          evaluateCircuit();
          updateComponentList();
          draw();
        }
        return;
      }
      
      if (interactionMode === 'connect' && connectingFrom) {
        tempWireEnd = { x: world.x, y: world.y };
        draw();
      }
    }

    function handlePointerUp(e) {
      e.preventDefault();
      if (e.touches) {
        if (e.touches.length < 2) {
          isPanning = false; isPinching = false;
          canvas.style.cursor = interactionMode === 'connect' ? 'crosshair' : (interactionMode === 'deleteGate' || interactionMode === 'deleteWire' || interactionMode === 'label' ? 'not-allowed' : 'grab');
        }
      } else {
        isPanning = false; isPinching = false;
        canvas.style.cursor = interactionMode === 'connect' ? 'crosshair' : (interactionMode === 'deleteGate' || interactionMode === 'deleteWire' || interactionMode === 'label' ? 'not-allowed' : 'grab');
      }
      if (isDraggingGate) {
        isDraggingGate = false;
        draggedGateId = null;
        canvas.classList.remove('dragging');
        evaluateCircuit();
        updateComponentList();
        draw();
      }
    }

    function handleContext(e) { e.preventDefault(); }

    // ----- 元件列表 -----
    function updateComponentList() {
      gateCountSpan.textContent = gates.length;
      if (gates.length === 0) {
        componentListDiv.innerHTML = '<div style="color:#7a86a8; text-align:center; padding:20px;">暂无元件</div>';
        return;
      }
      let html = '';
      gates.sort((a,b) => a.id - b.id).forEach(g => {
        const info = getGateInfo(g);
        const typeDisplay = info.name;
        const status = `输出:${g.outputValue}`;
        const coord = `(${Math.round(g.x)}, ${Math.round(g.y)})`;
        html += `<div class="list-item" data-gate-id="${g.id}">
          <div class="list-item-header">
            <span class="item-type">${typeDisplay}</span>
            <span class="item-id">ID:${g.id}</span>
          </div>
          <div class="item-detail">
            <span>${coord}</span>
            <span>${status}</span>
            ${g.label ? `<span class="item-label">📝 ${g.label}</span>` : ''}
          </div>
        </div>`;
      });
      componentListDiv.innerHTML = html;
      document.querySelectorAll('.list-item').forEach(el => {
        el.addEventListener('click', () => focusOnGate(parseInt(el.dataset.gateId)));
      });
    }
    
    function focusOnGate(gateId) {
      const gate = gates.find(g => g.id === gateId);
      if (!gate) return;
      if (highlightTimer) clearTimeout(highlightTimer);
      highlightGateId = gateId;
      draw();
      highlightTimer = setTimeout(() => { highlightGateId = null; draw(); }, 2000);
      
      const targetScale = Math.min(1.6, view.scale * 1.2);
      const screenCenterX = LOGIC_WIDTH / 2;
      const screenCenterY = LOGIC_HEIGHT / 2;
      const neededOffsetX = screenCenterX - gate.x * targetScale;
      const neededOffsetY = screenCenterY - gate.y * targetScale;
      view.scale = targetScale;
      view.offsetX = neededOffsetX;
      view.offsetY = neededOffsetY;
      zoomSlider.value = view.scale;
      zoomPercent.textContent = Math.round(view.scale * 100) + '%';
      draw();
    }

    function setMode(mode) {
      interactionMode = mode;
      wireModeBtn.classList.remove('active');
      deleteWireModeBtn.classList.remove('active', 'warning');
      deleteModeBtn.classList.remove('active', 'warning');
      labelModeBtn.classList.remove('active');
      if (mode === 'connect') { wireModeBtn.classList.add('active'); modeDisplay.textContent = '🔗 连线模式'; canvas.style.cursor = 'crosshair'; }
      else if (mode === 'deleteWire') { deleteWireModeBtn.classList.add('active', 'warning'); modeDisplay.textContent = '✂️ 删线模式'; canvas.style.cursor = 'not-allowed'; }
      else if (mode === 'deleteGate') { deleteModeBtn.classList.add('active', 'warning'); modeDisplay.textContent = '🗑️ 删元件模式'; canvas.style.cursor = 'not-allowed'; }
      else if (mode === 'label') { labelModeBtn.classList.add('active'); modeDisplay.textContent = '📝 批注文字模式'; canvas.style.cursor = 'help'; }
      else { modeDisplay.textContent = '🖱️ 拖拽/移动'; canvas.style.cursor = 'grab'; }
      connectingFrom = null; tempWireEnd = null;
      draw();
    }

    function addGate(type) {
      const centerWorld = screenToWorld(LOGIC_WIDTH/2, LOGIC_HEIGHT/2);
      const newGate = { id: nextId++, type, x: centerWorld.x, y: centerWorld.y, inputs: [], outputValue: 0, label: '' };
      if (type === 'SWITCH') newGate.outputValue = 0;
      if (type === 'LED') newGate.inputs = [0];
      gates.push(newGate);
      evaluateCircuit();
      updateComponentList();
      draw();
    }

    function handleResize() { draw(); }

    function bindEvents() {
      canvas.addEventListener('touchstart', handlePointerDown, { passive: false });
      canvas.addEventListener('touchmove', handlePointerMove, { passive: false });
      canvas.addEventListener('touchend', handlePointerUp);
      canvas.addEventListener('touchcancel', handlePointerUp);
      canvas.addEventListener('mousedown', handlePointerDown);
      canvas.addEventListener('mousemove', handlePointerMove);
      canvas.addEventListener('mouseup', handlePointerUp);
      canvas.addEventListener('contextmenu', handleContext);
      window.addEventListener('resize', handleResize);
      
      document.querySelectorAll('[data-gate]').forEach(btn => btn.addEventListener('click', () => addGate(btn.dataset.gate)));
      wireModeBtn.addEventListener('click', () => setMode(interactionMode === 'connect' ? 'select' : 'connect'));
      deleteWireModeBtn.addEventListener('click', () => setMode(interactionMode === 'deleteWire' ? 'select' : 'deleteWire'));
      deleteModeBtn.addEventListener('click', () => setMode(interactionMode === 'deleteGate' ? 'select' : 'deleteGate'));
      labelModeBtn.addEventListener('click', () => setMode(interactionMode === 'label' ? 'select' : 'label'));
      document.getElementById('clearWiresBtn').addEventListener('click', () => { wires = []; evaluateCircuit(); updateComponentList(); draw(); });
      document.getElementById('saveFileBtn').addEventListener('click', exportToFile);
      document.getElementById('loadFileBtn').addEventListener('click', () => fileInput.click());
      fileInput.addEventListener('change', (e) => { if (fileInput.files.length) { importFromFile(fileInput.files[0]); fileInput.value = ''; updateComponentList(); } });
      document.getElementById('resetViewBtn').addEventListener('click', () => { view.scale = 1.0; view.offsetX = 0; view.offsetY = 0; zoomSlider.value = '1.0'; zoomPercent.textContent = '100%'; draw(); });
      document.getElementById('refreshListBtn').addEventListener('click', updateComponentList);
      zoomSlider.addEventListener('input', (e) => { view.scale = parseFloat(e.target.value); zoomPercent.textContent = Math.round(view.scale * 100) + '%'; draw(); });
    }

    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (w < 2 * r) r = w / 2;
      if (h < 2 * r) r = h / 2;
      this.moveTo(x + r, y);
      this.lineTo(x + w - r, y);
      this.quadraticCurveTo(x + w, y, x + w, y + r);
      this.lineTo(x + w, y + h - r);
      this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      this.lineTo(x + r, y + h);
      this.quadraticCurveTo(x, y + h, x, y + h - r);
      this.lineTo(x, y + r);
      this.quadraticCurveTo(x, y, x + r, y);
      return this;
    };

    initDemo();
    bindEvents();
    draw();
    canvas.style.cursor = 'grab';
  })();
</script>
</body>
